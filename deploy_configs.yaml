present: "true"
deployment_prefix: prefix

dockerhub_read_user: "ioamrreadonly"
dockerhub_read_password: "INPUT PASSWORD"

site_name: tatsumi
routed_network: false

# Tracing for Debugging
tracing: true

# rosBagOptions
rosBagJobDefs_amr: { "name":"pa_rosbag", "compression":"BZ2", "recordOptions": { "topicIncludeRegex": ["(.*)mrrp/route(.*)","(.*)agent_status(.*)"] } }
rosBagJobDefs_gbc: { "name":"gbc_rosbag", "compression":"BZ2", "recordOptions": { "topicIncludeRegex": ["(.*)mrrp/route(.*)","(.*)agent_status(.*)"] } }
#rosBagJobDefs_amr: { "name":"pa_rosbag", "compression":"BZ2", "recordOptions": { "topicIncludeRegex": [ "(.*)move_base_flex(.*)", "(.*)rr_nav_server(.*)", "(.*)spin_turn(.*)", "(.*)cmd_vel(.*)", "/tf", "/tf_static", "(.*)cmd(.*)", "(.*)odom(.*)", "(.*)pose(.*)", "(.*)marker(.*)", "(.*)region(.*)", "(.*)map(.*)", "(.*)rosout(.*)" ] } }
#rosBagJobDefs_gbc: { "name":"gbc_rosbag", "compression":"BZ2", "recordOptions": { "topicIncludeRegex": [ "(.*)move_base_flex(.*)", "(.*)rr_nav_server(.*)", "(.*)spin_turn(.*)", "(.*)cmd_vel(.*)", "/tf", "/tf_static", "(.*)cmd(.*)", "(.*)odom(.*)", "(.*)pose(.*)", "(.*)marker(.*)", "(.*)region(.*)", "(.*)map(.*)", "(.*)rosout(.*)" ] } }

# PACKAGES
BUILD:
  PA:
    DOCKER_IMAGE: INPUT IMAGE TAG
  AMR_UI:
    DOCKER_IMAGE: INPUT IMAGE TAG
  GWM:
    DOCKER_IMAGE: INPUT IMAGE TAG
  DB:
    DOCKER_IMAGE: mdillon/postgis:latest

# DB
DB_PARAMS:
  POSTGRES_DB: gwm_core
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

# GWM Parameters
GWM_PARAMS:
  AUTOBOOTSTRAP: true
  DEBUG: true
  AUTO_ORG_NAME: autobootstrap
  AUTO_ROOT_USER: autobootstrap
  DJANGO_LOG_LEVEL: WARNING

# GBC Parameters
GBC_PARAMS:
  GWM_INTERFACE_SITE: tatsumi
  AUTOBOOTSTRAP: true
  GWM_INTERFACE_ORG_ID: 1
  GWM_INTERFACE_SITE_ID: 1
  GWM_INTERFACE_TOKEN: autobootstrap
  IO_AMR_GWM_INTERFACE_NODE_NAME: rr_gwm_interface
  ROSCONSOLE_FORMAT: "[$${severity}] [$${time}] [$${node} $${logger} $${function} $${line}]: $${message}"

# AMR UI Parameters
AMR_UI_PARAMS:
  SKIP_PREFLIGHT_CHECK: true
  GWM_API_VERSION: v1
  DEFAULT_GWM_INTERFACE_HOST: gbc
  DEFAULT_GWM_INTERFACE_PORT: 8080
  DEFAULT_GWM_INTERFACE_PROTOCOL: wss

# GAZEBO Parameters
GAZEBO_PARAMS:
  VNC_PASSWORD: rapyuta
  VNC_RESOLUTION: 1920x1080
  DEBUG: true
  SPAWN_PALLETS: true
  VERTICAL_CONVEYOR: false
  RACK: true
  MOBILE_RACK: false
  WORLD: tatsumi
  ITEM_SPAWN_FROM: AUTO
  GWM_AUTH_TOKEN: autobootstrap

