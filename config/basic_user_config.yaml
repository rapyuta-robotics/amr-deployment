# Configurable Parameters
deployment_prefix: example
deprovision_routed_network: true
deprovision_db: yes
deprovision_gwm: yes

# Global Parameters
PROJECT_ID: ENTER_PROJECT_ID
AUTH_TOKEN: ENTER_AUTH_TOKEN

# Docker Parameters
DOCKER_PASSWORD: ENTER_IOAMRREADONLY_PASSWORD

# Registered user device for debug
ADD_DEBUG_DEVICE: false
DEBUG_DEVICE: DEVICE_HOSTNAME

# GWM Autobootstarp credentials
GWM_PARAMS:
  AUTO_ROOT_USER: autobootstrap
  AUTO_ROOT_PASS: autobootstrap
  AUTO_AUTH_TOKEN: autobootstrap